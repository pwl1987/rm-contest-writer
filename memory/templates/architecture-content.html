<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容创意类架构图 - 数据新闻传播路径</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f6fa;
    min-height: 100vh;
    padding: 2rem;
  }
  .header {
    background: linear-gradient(90deg, #1a365d 0%, #2d5a87 100%);
    color: #fff;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 12px 12px 0 0;
  }
  .header .title { font-size: 1.1rem; font-weight: 600; }
  .header .step { font-size: 0.85rem; opacity: 0.8; }
  .content {
    background: #fff;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 2rem;
  }
  .arch-diagram {
    background: linear-gradient(180deg, #f8f9fa 0%, #fff 100%);
    border: 2px solid #e8e6dc;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .arch-title {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
    color: #1a365d;
    margin-bottom: 1.5rem;
  }
  .propagation-flow {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .prop-node {
    background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
    color: #fff;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    text-align: center;
    min-width: 100px;
    box-shadow: 0 4px 15px rgba(26,54,93,0.3);
    position: relative;
  }
  .prop-node.short {
    background: linear-gradient(135deg, #d4a84b 0%, #e8c068 100%);
    color: #1a365d;
    min-width: 80px;
    padding: 0.75rem 1rem;
  }
  .prop-node.social { background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%); }
  .prop-node.video { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
  .prop-node.news { background: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%); }
  .prop-label { font-size: 0.7rem; opacity: 0.8; margin-bottom: 0.3rem; }
  .prop-name { font-size: 0.9rem; font-weight: 600; }
  .prop-value { font-size: 0.75rem; opacity: 0.9; margin-top: 0.3rem; }
  .arrow-down {
    text-align: center;
    font-size: 1.5rem;
    color: #2d5a87;
    margin: 0.5rem 0;
  }
  .arrow-right {
    font-size: 1.2rem;
    color: #2d5a87;
    align-self: center;
  }
  .channel-group {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .channel-box {
    background: #e0e8f0;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.8rem;
    color: #1a365d;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .metrics-row {
    display: flex;
    justify-content: space-around;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px dashed #e8e6dc;
  }
  .metric { text-align: center; }
  .metric .val { font-size: 1.5rem; font-weight: 700; color: #2d5a87; }
  .metric .key { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }
</style>
</head>
<body>
  <div class="header">
    <div class="title">🏆 融媒技术创新大赛</div>
    <div class="step">Step 2/4 · 方案设计</div>
  </div>
  <div class="content">
    <div class="arch-diagram">
      <div class="arch-title">内容创意类 · 传播路径架构图</div>
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="display: inline-block; background: linear-gradient(135deg, #1a365d, #2d5a87); color: #fff; padding: 1rem 2rem; border-radius: 10px;">
          <div style="font-size: 0.75rem; opacity: 0.8;">内容策划</div>
          <div style="font-size: 1rem; font-weight: 600;">选题→采编→制作</div>
        </div>
      </div>
      <div class="arrow-down">↓</div>
      <div class="propagation-flow">
        <div class="prop-node">
          <div class="prop-label">首发平台</div>
          <div class="prop-name">微信公众号</div>
          <div class="prop-value">阅读 100万+</div>
        </div>
        <div class="arrow-right">→</div>
        <div class="prop-node social">
          <div class="prop-label">社交传播</div>
          <div class="prop-name">微博话题</div>
          <div class="prop-value">阅读 856万</div>
        </div>
        <div class="arrow-right">→</div>
        <div class="prop-node video">
          <div class="prop-label">短视频扩散</div>
          <div class="prop-name">抖音/快手</div>
          <div class="prop-value">观看 520万</div>
        </div>
      </div>
      <div class="arrow-down">↓</div>
      <div class="propagation-flow">
        <div class="prop-node short">
          <div class="prop-name">媒体转载</div>
        </div>
        <div class="arrow-right">→</div>
        <div class="prop-node short">
          <div class="prop-name">KOL扩散</div>
        </div>
        <div class="arrow-right">→</div>
        <div class="prop-node short">
          <div class="prop-name">搜索收录</div>
        </div>
        <div class="arrow-right">→</div>
        <div class="prop-node short news">
          <div class="prop-name">全网热点</div>
        </div>
      </div>
      <div class="channel-group">
        <div class="channel-box">📱 微信公众号</div>
        <div class="channel-box">💬 微博</div>
        <div class="channel-box">🎵 抖音</div>
        <div class="channel-box">📺 快手</div>
        <div class="channel-box">🌐 门户网站</div>
        <div class="channel-box">📰 头条号</div>
        <div class="channel-box">🎬 视频号</div>
      </div>
    </div>
    <div class="metrics-row">
      <div class="metric">
        <div class="val">1280万</div>
        <div class="key">累计阅读量</div>
      </div>
      <div class="metric">
        <div class="val">2.3亿</div>
        <div class="key">品牌曝光总值</div>
      </div>
      <div class="metric">
        <div class="val">45.6万</div>
        <div class="key">互动量</div>
      </div>
      <div class="metric">
        <div class="val">20+</div>
        <div class="key">媒体转载数</div>
      </div>
    </div>
  </div>
</body>
</html>
